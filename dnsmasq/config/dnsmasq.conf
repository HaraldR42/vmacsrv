# =============================================================================
# dnsmasq configuration
# Networks : loopback
#            172.29.60.0/24  (vintagehost_if, 172.29.60.1)
#            172.29.61.0/24  (ethoudp_tap,    172.29.61.1)
# Domain   : vintage.macgeek.home
# =============================================================================


# -----------------------------------------------------------------------------
# Core / Interface binding
# -----------------------------------------------------------------------------

# Bind exclusively to the two local interface and localhost — nothing else gets DNS or DHCP
interface=lo
interface=vintagehost_if
interface=ethoudp_tap

# Hard-bind: do not open sockets on any other interface
bind-interfaces

# Do NOT read the system /etc/hosts
no-hosts

# Use a dedicated hosts file instead
addn-hosts=/etc/dnsmasq.hosts

# Local domain — never forward queries for this domain upstream
domain=vintage.macgeek.home
local=/vintage.macgeek.home/

# Expand plain short names to the local domain
expand-hosts


# -----------------------------------------------------------------------------
# Upstream DNS
# -----------------------------------------------------------------------------

# Do not read /etc/resolv.conf for upstream servers
no-resolv

# Forward all unresolved queries to this resolver
server=172.29.0.1

# Never forward plain names (no dots) upstream
domain-needed

# Never forward RFC-1918 reverse lookups upstream
bogus-priv


# -----------------------------------------------------------------------------
# IPv6 — completely disabled
# -----------------------------------------------------------------------------

# Drop AAAA responses to clients
filter-AAAA


# -----------------------------------------------------------------------------
# DHCP — 172.29.60.0/24  (vintagehost_if)
# -----------------------------------------------------------------------------

dhcp-range=set:vintagehost_if,172.29.60.130,172.29.60.180,255.255.255.0,24h
dhcp-option=tag:vintagehost_if,option:router,172.29.60.1
dhcp-option=tag:vintagehost_if,option:dns-server,172.29.60.1
dhcp-option=tag:vintagehost_if,option:domain-name,vintage.macgeek.home


# -----------------------------------------------------------------------------
# DHCP — 172.29.61.0/24  (ethoudp_tap)
# -----------------------------------------------------------------------------

dhcp-range=set:ethoudp_tap,172.29.61.130,172.29.61.180,255.255.255.0,24h
dhcp-option=tag:ethoudp_tap,option:router,172.29.61.1
dhcp-option=tag:ethoudp_tap,option:dns-server,172.29.61.1
dhcp-option=tag:ethoudp_tap,option:domain-name,vintage.macgeek.home


# -----------------------------------------------------------------------------
# DHCP — common settings
# -----------------------------------------------------------------------------

# Persist leases across restarts
dhcp-leasefile=/var/lib/dnsmasq/dnsmasq.leases

# Log DHCP transactions
log-dhcp


# -----------------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------------

#log-queries
log-facility=-
